{% extends 'base.html' %}
{% block title %}Cadastrar Porteiro - Receba{% endblock %}
{% block content %}

<div class="mt-4">
  <h3><i class="bi bi-person-badge mr-2"></i>Cadastrar Porteiro</h3>
</div>

<form method="POST" action="{{ url_for('main.cadastrar_porteiro_route') }}" class="mt-5">
  <div class="form-group">
    <label for="nome">Nome</label>
    <input type="text" class="form-control" id="nome" name="nome" minlength="3" required>
  </div>
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" class="form-control" id="email" name="email" required>
  </div>
  <div class="form-group">
    <label for="password">Senha</label>
    <input type="password" class="form-control" id="password" name="password" minlength="6" required>
  </div>
  <button type="submit" class="btn btn-primary">Cadastrar</button>
</form>
{% endblock %}
