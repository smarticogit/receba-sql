{% extends 'base.html' %}
{% block title %}Cadastrar Morador - Receba{% endblock %}
{% block content %}

<div class="mt-4">
  <h3><i class="bi bi-house-add mr-2"></i>Cadastrar Morador</h3>
</div>

<form method="POST" action="{{ url_for('main.cadastrar_morador_route') }}">
  <div class="form-group">
    <label for="nome">Nome</label>
    <input type="text" class="form-control" id="nome" name="nome" required>
  </div>
  <div class="form-group">
    <label for="torre">Torre</label>
    <input type="text" class="form-control" id="torre" name="torre" required>
  </div>
  <div class="form-group">
    <label for="ap">Apartamento</label>
    <input type="text" class="form-control" id="ap" name="ap" required>
  </div>
  <div class="form-group">
    <label for="whatsapp">WhatsApp (apenas números, com DDD)</label>
    <input type="text" class="form-control" id="whatsapp" name="whatsapp" maxlength="15">
  </div>
  <button type="submit" class="btn btn-primary">Cadastrar</button>
</form>

<script>
  document.getElementById('whatsapp').addEventListener('input', function (e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length <= 11) {
      if (value.length <= 2) {
        value = value;
      } else if (value.length <= 6) {
        value = '(' + value.slice(0, 2) + ') ' + value.slice(2);
      } else if (value.length <= 10) {
        value = '(' + value.slice(0, 2) + ') ' + value.slice(2, 6) + '-' + value.slice(6);
      } else {
        value = '(' + value.slice(0, 2) + ') ' + value.slice(2, 7) + '-' + value.slice(7);
      }
      e.target.value = value;
    }
  });
</script>
{% endblock %}
